<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>MODIS slow voyage background</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #010207;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background:
          radial-gradient(circle at 46% 34%, rgba(54, 91, 154, 0.2), transparent 28%),
          radial-gradient(circle at 78% 62%, rgba(40, 93, 132, 0.12), transparent 24%),
          #010207;
      }

      .full-bleed,
      .clip {
        position: absolute;
        inset: 0;
      }

      .clip {
        pointer-events: none;
      }

      .layer {
        position: absolute;
        display: block;
        max-width: none;
        user-select: none;
        pointer-events: none;
        transform-origin: 50% 50%;
      }

      .base {
        left: -7%;
        top: -9%;
        width: 114%;
        height: 118%;
        object-fit: cover;
        opacity: 0.82;
        filter: saturate(0.9) brightness(0.82) contrast(1.08);
      }

      .galaxy-main {
        left: 45%;
        top: 25%;
        width: 11%;
        opacity: 0.5;
        mix-blend-mode: screen;
        filter: blur(0.1px) saturate(1.05);
      }

      .galaxy-right {
        left: 75%;
        top: 35%;
        width: 7.2%;
        opacity: 0.32;
        mix-blend-mode: screen;
      }

      .galaxy-lower {
        left: 64%;
        top: 82%;
        width: 6.2%;
        opacity: 0.3;
        mix-blend-mode: screen;
      }

      .starfield,
      .starfield::before,
      .starfield::after,
      .blue-feather,
      .grain {
        position: absolute;
        inset: -8%;
        pointer-events: none;
      }

      .starfield {
        opacity: 0.66;
        background-image:
          radial-gradient(circle at 8% 12%, rgba(255, 248, 226, 0.9) 0 1px, transparent 1.4px),
          radial-gradient(circle at 18% 76%, rgba(218, 236, 255, 0.82) 0 1.1px, transparent 1.6px),
          radial-gradient(circle at 35% 22%, rgba(140, 184, 236, 0.74) 0 1.2px, transparent 1.7px),
          radial-gradient(circle at 56% 18%, rgba(255, 229, 188, 0.78) 0 1.2px, transparent 1.8px),
          radial-gradient(circle at 78% 28%, rgba(223, 238, 255, 0.86) 0 1px, transparent 1.5px),
          radial-gradient(circle at 91% 72%, rgba(145, 189, 240, 0.62) 0 1.3px, transparent 1.9px);
        background-size: 460px 340px, 520px 390px, 610px 430px, 700px 520px, 540px 360px, 760px 560px;
      }

      .starfield::before {
        content: "";
        opacity: 0.34;
        background:
          radial-gradient(circle at 22% 44%, rgba(218, 236, 255, 0.6) 0 0.8px, transparent 1.3px),
          radial-gradient(circle at 72% 54%, rgba(255, 236, 203, 0.48) 0 0.9px, transparent 1.4px);
        background-size: 210px 180px, 260px 220px;
      }

      .starfield::after {
        content: "";
        opacity: 0.32;
        background:
          radial-gradient(ellipse at 48% 38%, rgba(119, 155, 214, 0.22), transparent 42%),
          radial-gradient(ellipse at 62% 58%, rgba(223, 160, 98, 0.12), transparent 36%);
        mix-blend-mode: screen;
      }

      .blue-feather {
        opacity: 0.24;
        background:
          radial-gradient(ellipse at 18% 55%, rgba(104, 157, 232, 0.32), transparent 38%),
          radial-gradient(ellipse at 70% 72%, rgba(86, 133, 204, 0.24), transparent 36%);
        mix-blend-mode: screen;
        transform: rotate(-7deg);
      }

      .grain {
        opacity: 0.13;
        background-image:
          radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.2) 0 0.8px, transparent 1px),
          radial-gradient(circle at 70% 40%, rgba(255, 255, 255, 0.14) 0 0.8px, transparent 1px);
        background-size: 34px 34px, 47px 47px;
        mix-blend-mode: screen;
      }

      .vignette {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 46%, transparent 34%, rgba(1, 4, 12, 0.18) 72%, rgba(0, 0, 0, 0.54) 100%),
          linear-gradient(180deg, rgba(1, 4, 12, 0.08), rgba(1, 4, 12, 0.34));
      }

      @keyframes baseVoyage {
        0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
        50% { transform: translate3d(-26px, 12px, 0) scale(1.028); }
      }

      @keyframes mainVoyage {
        0%, 100% { transform: translate3d(0, 0, 0) rotate(-6deg) scale(1); }
        50% { transform: translate3d(-44px, 22px, 0) rotate(-4deg) scale(1.08); }
      }

      @keyframes rightVoyage {
        0%, 100% { transform: translate3d(0, 0, 0) rotate(5deg) scale(1); }
        50% { transform: translate3d(-58px, 14px, 0) rotate(3deg) scale(1.12); }
      }

      @keyframes lowerVoyage {
        0%, 100% { transform: translate3d(0, 0, 0) rotate(-8deg) scale(1); }
        50% { transform: translate3d(-34px, -24px, 0) rotate(-7deg) scale(1.1); }
      }

      @keyframes starVoyage {
        0%, 100% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.62; }
        50% { transform: translate3d(-34px, 16px, 0) scale(1.025); opacity: 0.74; }
      }

      @keyframes closeStars {
        0%, 100% { transform: translate3d(0, 0, 0); }
        50% { transform: translate3d(-68px, 28px, 0); }
      }

      @keyframes hazeBreath {
        0%, 100% { transform: scale(1); opacity: 0.28; }
        50% { transform: scale(1.05); opacity: 0.4; }
      }

      @keyframes featherDrift {
        0%, 100% { transform: translate3d(0, 0, 0) rotate(-7deg) scale(1); }
        50% { transform: translate3d(20px, -12px, 0) rotate(-5deg) scale(1.04); }
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="home-slow-voyage"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="12"
      data-fps="30"
    >
      <div id="voyage-bg" class="full-bleed">
        <img class="layer base" src="assets/home-space-layers/img-v3/base-matte.png" alt="" />
        <div class="blue-feather"></div>
        <img class="layer galaxy-main" src="assets/home-space-layers/img-v3/galaxy-main-spiral.png" alt="" />
        <img class="layer galaxy-right" src="assets/home-space-layers/img-v3/galaxy-right-edge-on.png" alt="" />
        <img class="layer galaxy-lower" src="assets/home-space-layers/img-v3/galaxy-bottom-blue-edge.png" alt="" />
        <div class="starfield"></div>
        <div class="grain"></div>
        <div class="vignette"></div>
      </div>
      <section id="motion-window" class="clip" data-start="0" data-duration="12" data-track-index="1"></section>
    </div>
    <script src="assets/vendor/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};

      const tl = gsap.timeline({ paused: true, defaults: { ease: "sine.inOut" } });
      tl.set([".base", ".galaxy-main", ".galaxy-right", ".galaxy-lower", ".starfield", ".blue-feather", ".grain"], {
        force3D: true,
      });

      tl.to(".base", { x: -12, y: 6, scale: 1.026, duration: 6 }, 0)
        .to(".base", { x: 0, y: 0, scale: 1, duration: 6 }, 6)
        .to(".galaxy-main", { x: -32, y: 18, scale: 1.07, rotation: 0.2, duration: 6 }, 0)
        .to(".galaxy-main", { x: 0, y: 0, scale: 1, rotation: 0, duration: 6 }, 6)
        .to(".galaxy-right", { x: -44, y: 8, scale: 1.085, rotation: -0.28, duration: 6 }, 0)
        .to(".galaxy-right", { x: 0, y: 0, scale: 1, rotation: 0, duration: 6 }, 6)
        .to(".galaxy-lower", { x: -22, y: -10, scale: 1.05, duration: 6 }, 0)
        .to(".galaxy-lower", { x: 0, y: 0, scale: 1, duration: 6 }, 6)
        .to(".starfield", { x: -28, y: 16, scale: 1.05, duration: 6 }, 0)
        .to(".starfield", { x: 0, y: 0, scale: 1, duration: 6 }, 6)
        .to(".blue-feather", { x: 20, y: -12, rotation: -5, scale: 1.04, duration: 6 }, 0)
        .to(".blue-feather", { x: 0, y: 0, rotation: -7, scale: 1, duration: 6 }, 6)
        .to(".grain", { x: 16, y: -9, duration: 6 }, 0)
        .to(".grain", { x: 0, y: 0, duration: 6 }, 6);

      window.__timelines["home-slow-voyage"] = tl;
      tl.seek(0);
    </script>
  </body>
</html>
