<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>MODIS cluster perspective shift</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #010207;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background:
          radial-gradient(circle at 48% 36%, rgba(54, 91, 154, 0.2), transparent 28%),
          radial-gradient(circle at 76% 58%, rgba(62, 126, 172, 0.13), transparent 24%),
          #010207;
      }

      .full-bleed,
      .clip {
        position: absolute;
        inset: 0;
      }

      .clip {
        pointer-events: none;
      }

      .camera {
        position: absolute;
        inset: -8%;
        transform-origin: 52% 44%;
      }

      .layer {
        position: absolute;
        display: block;
        max-width: none;
        user-select: none;
        pointer-events: none;
        transform-origin: 50% 50%;
      }

      .base {
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.84;
        filter: saturate(0.9) brightness(0.78) contrast(1.1);
      }

      .galaxy-main {
        left: 45%;
        top: 26%;
        width: 11.5%;
        opacity: 0.52;
        mix-blend-mode: screen;
      }

      .galaxy-right {
        left: 76%;
        top: 36%;
        width: 7.6%;
        opacity: 0.34;
        mix-blend-mode: screen;
      }

      .starfield,
      .starfield::before,
      .near-stars,
      .blue-feather,
      .focus-haze,
      .grain {
        position: absolute;
        inset: -8%;
        pointer-events: none;
      }

      .starfield {
        opacity: 0.7;
        background-image:
          radial-gradient(circle at 8% 12%, rgba(255, 248, 226, 0.9) 0 1px, transparent 1.4px),
          radial-gradient(circle at 18% 76%, rgba(218, 236, 255, 0.82) 0 1.1px, transparent 1.6px),
          radial-gradient(circle at 35% 22%, rgba(140, 184, 236, 0.74) 0 1.2px, transparent 1.7px),
          radial-gradient(circle at 56% 18%, rgba(255, 229, 188, 0.78) 0 1.2px, transparent 1.8px),
          radial-gradient(circle at 78% 28%, rgba(223, 238, 255, 0.86) 0 1px, transparent 1.5px),
          radial-gradient(circle at 91% 72%, rgba(145, 189, 240, 0.62) 0 1.3px, transparent 1.9px);
        background-size: 460px 340px, 520px 390px, 610px 430px, 700px 520px, 540px 360px, 760px 560px;
      }

      .near-stars {
        inset: -15%;
        opacity: 0.5;
        background-image:
          radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 0.98) 0 1.6px, transparent 2.3px),
          radial-gradient(circle at 28% 72%, rgba(189, 219, 255, 0.82) 0 1.3px, transparent 2px),
          radial-gradient(circle at 44% 36%, rgba(255, 231, 198, 0.72) 0 1.4px, transparent 2.1px),
          radial-gradient(circle at 64% 16%, rgba(146, 190, 246, 0.76) 0 1.7px, transparent 2.4px),
          radial-gradient(circle at 84% 68%, rgba(255, 255, 255, 0.86) 0 1.5px, transparent 2.2px);
        background-size: 360px 300px, 430px 330px, 510px 410px, 620px 430px, 700px 520px;
        mix-blend-mode: screen;
      }

      .starfield::before {
        content: "";
        opacity: 0.42;
        background:
          radial-gradient(circle at 22% 44%, rgba(218, 236, 255, 0.6) 0 0.8px, transparent 1.3px),
          radial-gradient(circle at 72% 54%, rgba(255, 236, 203, 0.48) 0 0.9px, transparent 1.4px);
        background-size: 210px 180px, 260px 220px;
      }

      .blue-feather {
        opacity: 0.26;
        background:
          radial-gradient(ellipse at 16% 55%, rgba(104, 157, 232, 0.34), transparent 38%),
          radial-gradient(ellipse at 72% 72%, rgba(86, 133, 204, 0.26), transparent 36%);
        mix-blend-mode: screen;
      }

      .focus-haze {
        opacity: 0.22;
        background:
          radial-gradient(ellipse at 48% 42%, rgba(142, 175, 232, 0.32), transparent 35%),
          radial-gradient(ellipse at 58% 60%, rgba(236, 190, 122, 0.12), transparent 28%);
        mix-blend-mode: screen;
      }

      .grain {
        opacity: 0.13;
        background-image:
          radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.2) 0 0.8px, transparent 1px),
          radial-gradient(circle at 70% 40%, rgba(255, 255, 255, 0.14) 0 0.8px, transparent 1px);
        background-size: 34px 34px, 47px 47px;
        mix-blend-mode: screen;
      }

      .vignette {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 46%, transparent 32%, rgba(1, 4, 12, 0.18) 72%, rgba(0, 0, 0, 0.56) 100%),
          linear-gradient(180deg, rgba(1, 4, 12, 0.1), rgba(1, 4, 12, 0.36));
      }

      @keyframes cameraShift {
        0% { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); filter: blur(0); }
        48% { filter: blur(0.45px); }
        100% { transform: translate3d(-42px, 18px, 0) scale(1.055) rotate(-0.35deg); filter: blur(0); }
      }

      @keyframes basePush {
        0% { transform: translate3d(0, 0, 0) scale(1); }
        100% { transform: translate3d(-22px, 10px, 0) scale(1.03); }
      }

      @keyframes mainPush {
        0% { transform: translate3d(0, 0, 0) rotate(-6deg) scale(1); }
        100% { transform: translate3d(-92px, 42px, 0) rotate(-3deg) scale(1.18); }
      }

      @keyframes rightPush {
        0% { transform: translate3d(0, 0, 0) rotate(5deg) scale(1); }
        100% { transform: translate3d(-124px, 24px, 0) rotate(3deg) scale(1.2); }
      }

      @keyframes starsPush {
        0% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.62; }
        100% { transform: translate3d(-88px, 36px, 0) scale(1.04); opacity: 0.76; }
      }

      @keyframes closeStarsPush {
        0% { transform: translate3d(0, 0, 0) scale(1); }
        100% { transform: translate3d(-150px, 60px, 0) scale(1.07); }
      }

      @keyframes featherPush {
        0% { transform: translate3d(0, 0, 0) rotate(-7deg) scale(1); }
        100% { transform: translate3d(34px, -18px, 0) rotate(-3deg) scale(1.06); }
      }

      @keyframes hazePush {
        0% { transform: scale(0.96); opacity: 0.14; }
        100% { transform: scale(1.08); opacity: 0.3; }
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="cluster-perspective-shift"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="2"
      data-fps="30"
    >
      <div id="shift-bg" class="full-bleed">
        <div class="camera">
          <img class="layer base" src="assets/home-space-layers/img-v3/base-matte.png" alt="" />
          <div class="blue-feather"></div>
          <img class="layer galaxy-main" src="assets/home-space-layers/img-v3/galaxy-main-spiral.png" alt="" />
          <img class="layer galaxy-right" src="assets/home-space-layers/img-v3/galaxy-right-edge-on.png" alt="" />
          <div class="starfield"></div>
          <div class="near-stars"></div>
          <div class="focus-haze"></div>
          <div class="grain"></div>
        </div>
        <div class="vignette"></div>
      </div>
      <section id="motion-window" class="clip" data-start="0" data-duration="2" data-track-index="1"></section>
    </div>
    <script src="assets/vendor/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};

      const tl = gsap.timeline({ paused: true, defaults: { duration: 2, ease: "power3.inOut" } });
      tl.set([".camera", ".base", ".galaxy-main", ".galaxy-right", ".starfield", ".near-stars", ".blue-feather", ".focus-haze", ".grain"], {
        force3D: true,
      });

      tl.to(".camera", { x: -70, y: 28, scale: 1.09, rotation: 0.5 }, 0)
        .to(".base", { x: -50, y: 20, scale: 1.08 }, 0)
        .to(".galaxy-main", { x: -128, y: 54, scale: 1.22, rotation: 0.72 }, 0)
        .to(".galaxy-right", { x: -160, y: 34, scale: 1.28, rotation: -0.86 }, 0)
        .to(".starfield", { x: -160, y: 65, scale: 1.22, opacity: 0.84 }, 0)
        .to(".near-stars", { x: -360, y: 130, scale: 1.32, opacity: 0.74 }, 0)
        .to(".blue-feather", { x: -70, y: -38, scale: 1.28, rotation: -2 }, 0)
        .to(".focus-haze", { opacity: 0.42, scale: 1.2 }, 0)
        .to(".grain", { x: -190, y: 72 }, 0);

      window.__timelines["cluster-perspective-shift"] = tl;
      tl.seek(0);
    </script>
  </body>
</html>
